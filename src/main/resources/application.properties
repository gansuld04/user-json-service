# ================================================================
# application.properties - JSON Service тохиргоо
# ================================================================

# Port 8080 - default Spring Boot port
server.port=8080

# ================================================================
# H2 In-Memory Database - Profile DB (SOAP-ийн Auth DB-с тусдаа!)
# Option 2: Independent Databases сонгосон тул тусдаа DB ашиглана
# ================================================================
spring.datasource.url=jdbc:h2:mem:profiledb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console - http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA тохиргоо
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ================================================================
# SOAP Service холболт
# JSON Service middleware нь энэ хаягаар SOAP руу ValidateToken дуудна
# ================================================================
soap.service.url=${SOAP_SERVICE_URL:http://localhost:8081/ws}